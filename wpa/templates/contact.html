{% extends "navbar.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/contact.css' %}">
{% endblock css %}

{% block title %}Emergency Contact{% endblock title %}

{% block body %}

<div class="form-page">

    <div class="card">
        <h2> Emergency Help</h2>

        <form class="grid-form" enctype="multipart/form-data">

            <!-- Row 1 -->
            <div class="input-box">
                <input type="text" required placeholder="">
                <label>Your Name</label>
            </div>

            <div class="input-box">
                <input type="tel" required placeholder="">
                <label>Phone Number</label>
            </div>

            <div class="input-box">
                <input type="tel" required placeholder="">
                <label>Emergency Contact</label>
            </div>

            <div class="input-box">
                <input type="text" required placeholder="">
                <label>City / Area</label>
            </div>

            <div class="input-box full">
                <input type="text" required placeholder="">
                <label>What happened?</label>
            </div>

            <div class="input-box">
                <input type="text" id="location" readonly placeholder="">
                <label>Your Location</label>
            </div>

            <div class="input-box">
                <input type="text" id="coords" readonly placeholder="">
                <label>Coordinates</label>
            </div>

            <div class="input-box full file-box">
                <label>Upload Audio / Video</label>

                <input type="file" id="mediaFile" name="media" accept="audio/*,video/*" hidden>

                <button type="button" onclick="document.getElementById('mediaFile').click()">
                    Choose File
                </button>

                <p id="fileName">No file selected</p>
            </div>

            <!-- Buttons -->
            <div class="full">
                <button type="button" onclick="getLocation()"> Detect Location</button>
                <button type="submit"> Send Alert</button>
            </div>

        </form>
    </div>

</div>

<script>
// 📍 Location
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Geolocation not supported");
    }
}

function showPosition(position) {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    document.getElementById("coords").value = lat + ", " + lon;

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("location").value = data.display_name;
    })
    .catch(() => {
        document.getElementById("location").value = "Unable to fetch location";
    });
}

function showError() {
    alert("Location access denied or unavailable");
}

// 📁 File name preview
document.getElementById("mediaFile").addEventListener("change", function(){
    const fileName = this.files[0]?.name || "No file selected";
    document.getElementById("fileName").innerText = fileName;
});
</script>

{% endblock body %}
