{% extends "navbar.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock css %}

{% block title %}Login{% endblock title %}

{% block body %}

<div class="form-page">   <!-- ✅ IMPORTANT FOR CENTERING -->

    <div class="scene">

        <!-- Optional floating circles -->
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>

        <div class="card">
            <h2>Login</h2>

            <form>
                <div class="input-box">
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <button>Login</button>
            </form>
        </div>

    </div>

</div>

{% endblock body %}
